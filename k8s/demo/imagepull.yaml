apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-imagepull
  namespace: demo-incidents
  labels:                           # ✅ Add/Change this block
    app: demo-imagepull
    demo: "true"
    environment: "demo"
    version: "v2"                   # ← Change this to v1, v2, v3...
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-imagepull
  template:
    metadata:
      labels:
        app: demo-imagepull
    spec:
      containers:
        - name: app
          image: nginx:wrong-version
          ports:
            - containerPort: 80