apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-devops-oncall-agent-reader
  namespace: default

rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - events
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch