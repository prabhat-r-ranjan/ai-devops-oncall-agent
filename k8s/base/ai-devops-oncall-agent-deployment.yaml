apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:07a427bff6d5f1fb00fe850289b5646f5d910a03
          imagePullPolicy: Always

          ports:
            - containerPort: 8000