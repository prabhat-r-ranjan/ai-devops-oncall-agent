apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      serviceAccountName: ai-devops-oncall-agent

      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:7afd47a0e44dd8823b1e0d48c6b680161f4b1635
          imagePullPolicy: Always

          ports:
            - containerPort: 8000