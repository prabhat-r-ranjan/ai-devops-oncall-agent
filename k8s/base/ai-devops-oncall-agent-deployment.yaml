apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      serviceAccountName: ai-devops-oncall-agent

      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:ea438a574a78bb463304fd78bb1bdbf7b73da79d
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: ai-devops-oncall-agent-config

            - secretRef:
                name: ai-devops-oncall-agent-secret