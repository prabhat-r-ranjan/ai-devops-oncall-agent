apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:87fa63e398fd30420e82a94ca702b52344d9d3cd
          imagePullPolicy: Always

          ports:
            - containerPort: 8000