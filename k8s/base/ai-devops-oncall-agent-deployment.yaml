apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:2de841ace1ff1438f06d43ea52ca36ece025272a
          imagePullPolicy: Always

          ports:
            - containerPort: 8000