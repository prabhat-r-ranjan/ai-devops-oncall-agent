apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      serviceAccountName: ai-devops-oncall-agent

      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:eb1a34824e8f094924d709c1e95cba073be41409
          imagePullPolicy: Always

          ports:
            - containerPort: 8000