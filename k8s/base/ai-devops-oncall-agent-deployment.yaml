apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-oncall-agent
  namespace: ai-devops
  labels:
    app: ai-devops-oncall-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-oncall-agent
  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent
    spec:
      serviceAccountName: ai-devops-oncall-agent-sa
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-devops-oncall-agent-config
            - secretRef:
                name: ai-devops-oncall-agent-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3