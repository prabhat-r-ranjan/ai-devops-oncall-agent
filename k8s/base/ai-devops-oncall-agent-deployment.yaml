apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-oncall-agent
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:3cb551fb1649354472a2e41e6b5e68f42ef8bc49
          imagePullPolicy: Always

          ports:
            - containerPort: 8000