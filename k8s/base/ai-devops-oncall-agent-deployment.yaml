apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-oncall-agent
  namespace: ai-devops
  labels:
    app: ai-devops-oncall-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-oncall-agent

  template:
    metadata:
      labels:
        app: ai-devops-oncall-agent

    spec:
      containers:
        - name: ai-devops-oncall-agent
          image: prabhatcr001.azurecr.io/ai-devops-oncall-agent:e7ed4c8579fd8ea259e3682b74d43fc6e9d0de2a
          imagePullPolicy: Always

          ports:
            - containerPort: 8000